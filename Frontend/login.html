<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - فولتيكس</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/login.css" />
    <link rel="icon" type="image/png" href="./logo/favicon.ico">
  </head>
  <body>
    <div class="max-w-md w-full p-4">
      <div class="flex items-center justify-center gap-2 mb-8">
        <div class="relative">
          <div
            class="absolute inset-0 bg-slate-900 rounded-lg blur-sm opacity-50"
          ></div>
          <div class="relative bg-slate-900 p-2 rounded-lg">
            <i
              data-lucide="zap"
              class="w-6 h-6 text-yellow-400 fill-yellow-400"
            ></i>
          </div>
        </div>
        <span class="text-3xl font-bold tracking-tight text-slate-900">
          VOLT<span class="text-yellow-500">IX</span>
        </span>
      </div>

      <div class="bg-white rounded-2xl shadow-xl p-8">
        <h2 class="text-2xl font-medium text-slate-900 mb-6 text-right">
          تسجيل الدخول
        </h2>

        <form id="loginForm" class="space-y-5">
          <div>
            <label for="email" class="block text-slate-700 mb-2 text-right">
              البريد الإلكتروني
            </label>
            <div class="relative">
              <i
                data-lucide="mail"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"
              ></i>
              <input
                type="email"
                id="email"
                class="w-full pr-11 pl-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent text-right"
                style="
                  width: 100%;
                  padding: 0.75rem 2.75rem 0.75rem 1rem;
                  border: 1px solid #cbd5e1;
                  border-radius: 0.5rem;
                "
                placeholder="example@gmail.com"
                required
              />
            </div>
          </div>

          <div>
            <label for="password" class="block text-slate-700 mb-2 text-right">
              كلمة المرور
            </label>
            <div class="relative">
              <i
                data-lucide="lock"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"
              ></i>
              <input
                type="password"
                id="password"
                class="w-full pr-11 pl-11 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent text-right"
                style="
                  width: 100%;
                  padding: 0.75rem 2.75rem 0.75rem 2.75rem;
                  border: 1px solid #cbd5e1;
                  border-radius: 0.5rem;
                "
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                id="togglePassword"
                class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 cursor-pointer"
              >
                <i data-lucide="eye" id="eyeIcon" class="w-5 h-5"></i>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between text-sm">
            <div class="flex items-center flex-row-reverse">
              <input
                type="checkbox"
                id="remember"
                class="w-4 h-4 text-slate-900 border-slate-300 rounded focus:ring-slate-900"
              />
              <label for="remember" class="mr-2 text-slate-700 cursor-pointer">
                تذكرني
              </label>
            </div>
            <a href="#" class="text-slate-900 hover:underline">
              نسيت كلمة المرور؟
            </a>
          </div>

          <button
            type="submit"
            class="w-full bg-[#0f172a] text-white py-3 rounded-lg hover:bg-[#1e293b] transition-colors cursor-pointer font-medium"
          >
            تسجيل الدخول
          </button>
        </form>

        <div class="mt-6 text-center text-sm">
          <p class="text-slate-600">
            معندكش حساب؟
            <a
              href="sign up.html"
              class="text-slate-900 font-bold hover:underline"
            >
              اعمل حساب جديد
            </a>
          </p>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-200">
          <div class="text-center mb-4 text-slate-500 text-sm">
            أو كمل باستخدام
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button
              class="flex items-center justify-center gap-2 py-2.5 border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer"
            >
              <svg class="w-5 h-5" viewBox="0 0 48 48">
                <path
                  fill="#4285F4"
                  d="M24 23.49v6.13h8.55c-.35 2.22-2.6 6.51-8.55 6.51-5.14 0-9.33-4.26-9.33-9.51 0-5.26 4.19-9.52 9.33-9.52 2.92 0 4.87 1.24 5.99 2.32l4.08-3.93 C31.45 12.9 28.03 11.5 24 11.5 16.47 11.5 10.5 17.42 10.5 24 c0 6.58 5.97 12.5 13.5 12.5 7.78 0 12.94-5.46 12.94-13.14 0-.88-.1-1.55-.22-2.23H24z"
                />
                <path
                  fill="#34A853"
                  d="M6.62 14.09l5.02 3.68 C13.14 14.1 18.16 11 24 11 c2.92 0 4.87 1.24 5.99 2.32 l4.08-3.93C31.45 6.9 28.03 5.5 24 5.5 16.47 5.5 9.9 10.05 6.62 14.09z"
                />
                <path
                  fill="#FBBC05"
                  d="M10.5 24 c0-1.64.38-3.19 1.05-4.58 l-5.02-3.68 C5.05 18.5 4.5 21.2 4.5 24 c0 2.8.55 5.5 2.03 8.26 l5.02-3.68 C10.88 27.19 10.5 25.64 10.5 24z"
                />
                <path
                  fill="#EA4335"
                  d="M24 42.5 c4.03 0 7.41-1.32 9.88-3.59 l-4.7-3.61 c-1.32.89-3.03 1.51-5.18 1.51 -5.84 0-10.86-3.94-12.36-9.28 l-5.02 3.68 C9.9 37.95 16.47 42.5 24 42.5z"
                />
              </svg>
              <span class="text-slate-700 text-sm">Google</span>
            </button>

            <button
              class="flex items-center justify-center gap-2 py-2.5 border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer"
            >
              <svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24">
                <path
                  d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47 h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953h-1.513c-1.49 0-1.953.925-1.953 1.874v2.25 h3.328l-.532 3.47h-2.796v8.385 C19.612 23.027 24 18.062 24 12.073z"
                />
              </svg>
              <span class="text-slate-700 text-sm">Facebook</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/login.js"></script>
  </body>
</html>
