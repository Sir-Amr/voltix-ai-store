<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltix | تجربة تسوق ذكية</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style/products.css">
    <link rel="icon" type="image/png" href="./logo/favicon.ico">
</head>

<body class="text-gray-800">

    <nav class="bg-white/80 backdrop-blur-lg shadow-lg sticky top-0 z-50 border-b border-purple-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
            <div class="flex items-center gap-2 flex-shrink-0">
                <div class="bg-gradient-to-br from-blue-600 to-purple-600 rounded-lg p-2 shadow-lg">
                    <a href="home.html"> <i data-lucide="zap" class="w-6 h-6 text-white"></i>
                </div>
                <span
                    class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Voltix</span>
                </a>
            </div>
            <div class="flex-1 max-w-2xl relative group">
                <input type="text" id="search-input" placeholder="ابحث عن منتجات..."
                    class="w-full px-4 py-2 pr-10 border border-purple-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 bg-white/90 transition-all text-right">
                <i data-lucide="search" class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-purple-400"></i>

            </div>
            <button onclick="toggleCartModal()" class="relative p-2 hover:bg-purple-50 rounded-xl transition-all group">
                <i data-lucide="shopping-cart" class="w-6 h-6 text-purple-600 group-hover:scale-110"></i>
                <span id="cart-badge"
                    class="absolute -top-1 -right-1 bg-gradient-to-br from-blue-500 to-purple-500 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center shadow-lg hidden">0</span>
            </button>
        </div>
    </nav>

    <section class="bg-white/90 backdrop-blur-lg border-b border-purple-100 shadow-sm sticky top-16 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div class="flex items-center gap-2 overflow-x-auto pb-2 md:pb-0 scrollbar-hide" id="category-filters">
            </div>
            <div class="flex items-center gap-3">
                <select id="sort-select" onchange="handleSort()"
                    class="appearance-none bg-white border border-purple-200 rounded-xl px-4 py-2 pr-10 focus:ring-2 focus:ring-purple-400 text-sm cursor-pointer transition-all">
                    <option value="featured">المميزة</option>
                    <option value="price-low">السعر: من الأقل للأعلى</option>
                    <option value="price-high">السعر: من الأعلى للأقل</option>
                </select>
                <div class="flex items-center gap-1 bg-purple-50 rounded-xl p-1">
                    <button onclick="changeView('grid')" id="grid-btn"
                        class="p-2 rounded-lg bg-gradient-to-br from-blue-600 to-purple-600 text-white shadow-lg"><i
                            data-lucide="grid" class="w-5 h-5"></i></button>
                    <button onclick="changeView('list')" id="list-btn"
                        class="p-2 rounded-lg text-purple-500 hover:bg-purple-100"><i data-lucide="list"
                            class="w-5 h-5"></i></button>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fadeIn"></div>
    </main>

    <div class="fixed bottom-6 left-6 z-50">
        <div id="chat-window"
            class="hidden absolute bottom-20 left-0 w-80 sm:w-96 bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl border border-purple-200 overflow-hidden animate-slideUp">
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-4 flex items-center justify-between text-white">
                <div class="flex items-center gap-3">
                    <div class="bg-white/20 rounded-full p-2"><i data-lucide="message-circle" class="w-5 h-5"></i></div>
                    <div><span class="block font-bold">مساعد Voltix</span><span class="text-xs opacity-80">متاح
                            الآن</span></div>
                </div>
                <button onclick="toggleChat()" class="hover:bg-white/20 rounded-full p-1.5 transition-all"><i
                        data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-4 h-80 overflow-y-auto bg-slate-50 space-y-3" id="chat-messages">
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-purple-100 text-sm animate-slideUp">أهلاً
                    بيك في Voltix! 👋 إزاي أقدر أساعدك؟</div>
            </div>
            <div class="p-3 border-t bg-white flex gap-2">
                <input type="text" id="chat-input" placeholder="اكتب رسالتك..."
                    class="flex-1 px-4 py-2 border border-purple-200 rounded-xl text-sm focus:outline-none">
                <button onclick="sendMessage()"
                    class="bg-blue-600 text-white p-2 rounded-xl hover:scale-105 transition-all"><i data-lucide="send"
                        class="w-5 h-5"></i></button>
            </div>
        </div>
        <button onclick="toggleChat()"
            class="bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-full p-4 shadow-2xl hover:scale-110 transition-all relative group">
            <div class="absolute inset-0 rounded-full bg-blue-400 animate-ping opacity-25"></div>
            <i data-lucide="message-circle" class="w-7 h-7 relative z-10"></i>
        </button>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-[100] hidden backdrop-blur-sm animate-fadeIn">
        <div
            class="absolute top-0 left-0 w-full sm:w-[450px] h-full bg-slate-50 shadow-2xl flex flex-col animate-slideUp">
            <div class="p-6 bg-white border-b border-purple-100 flex items-center justify-between">
                <h2 class="text-2xl font-bold text-gray-800">سلة التسوق</h2>
                <button onclick="toggleCartModal()"
                    class="p-2 hover:bg-red-50 text-red-500 rounded-full transition-all"><i data-lucide="x"
                        class="w-6 h-6"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <div id="cart-summary" class="p-6 bg-white border-t border-purple-100"></div>
        </div>
    </div>

    <script src="./js/products.js"></script>
</body>

</html>
